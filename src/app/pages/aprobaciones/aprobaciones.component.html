<div class="page-header">
  <div class="page-title-group">
    <h2>Aprobaciones Pendientes</h2>
    <p class="page-subtitle">Rendiciones enviadas que requieren tu revisión y aprobación</p>
  </div>
  <button class="btn btn-ghost btn-sm" (click)="load()">↺ Actualizar</button>
</div>

<!-- Estado de error -->
<div *ngIf="!loading && loadError" class="empty-state">
  No se pudo cargar. <a (click)="load()">Reintentar</a>
</div>

<!-- Lista de aprobaciones -->
<app-aprobaciones-list
  [items]="pendientes"
  [loading]="loading"
  [nivelFiltro]="nivelFiltro"
  (nivelFiltroChange)="onNivelFiltroChange($event)"
  (aprobar)="openAprobar($event)"
  (rechazar)="openRechazar($event)"
  (verDetalle)="onVerDetalle($event)">
</app-aprobaciones-list>

<!-- Modal de acción -->
<app-aprobacion-modal
  [isOpen]="showAccionModal"
  [accion]="accionActual"
  [comentario]="comentario"
  [isSaving]="isSaving"
  [rendicion]="rendSeleccionada"
  (comentarioChange)="comentario = $event"
  (confirmar)="confirmarAccion()"
  (cancelar)="closeModal()">
</app-aprobacion-modal>
