<app-crud-page-header
  title="Cuentas Cabecera Rendición"
  subtitle="Definí las cuentas disponibles en la cabecera de rendición para cada perfil."
  [actionLabel]="auth.puedeEditarConf ? '+ Adicionar' : null"
  [actionDisabled]="!selectedPerfilId"
  (actionClick)="openForm()">
</app-crud-page-header>

<!-- ── Selector de perfil ── -->
<div class="filter-bar">
  <div class="filter-left">
    <div class="filter-field perfil-selector-inline">
      <label>Seleccione Perfil</label>
      <app-perfil-select
        placeholder="— Seleccione Perfil —"
        (perfilChange)="onPerfilChange($event)"
        (perfilObjChange)="selectedPerfil = $event">
      </app-perfil-select>
    </div>
  </div>
</div>

<!-- ── Modal: Buscar y agregar cuenta desde SAP ────────────── -->
<app-form-modal
  [title]="'Agregar Cuenta'"
  [subtitle]="selectedPerfil?.U_NombrePerfil ?? null"
  [isOpen]="showForm"
  [loading]="isSaving"
  [isEditing]="false"
  [submitDisabled]="!selectedAccount || isSaving"
  (save)="save()"
  (cancel)="closeForm()">
  
  <ng-template #formContent>
    <div class="modal-body">
      <app-form-field
        label="Buscar cuenta"
        [required]="true"
        hint="código o nombre">
        <app-cuenta-search
          (accountChange)="onAccountChange($event)">
        </app-cuenta-search>
      </app-form-field>
    </div>
  </ng-template>
</app-form-modal>

<!-- ── Barra de búsqueda ───────────────────────────────────── -->
<div class="filter-bar" *ngIf="selectedPerfilId">
  <div class="filter-left">
    <div class="filter-field">
      <label>Buscar cuenta</label>
      <app-search-input
        placeholder="Buscar por código o nombre..."
        [debounceTime]="300"
        [search]="store.search()"
        (valueChange)="onSearchChange($event)"
        (cleared)="onSearchCleared()">
      </app-search-input>
    </div>
  </div>
  <span class="filter-count" *ngIf="!store.loading()">
    {{ store.filtered().length }} cuenta{{ store.filtered().length !== 1 ? 's' : '' }}
  </span>
</div>

<!-- ── Estados vacíos ──────────────────────────────────────── -->
<div *ngIf="!selectedPerfilId" class="empty-state">
  Seleccioná un perfil para ver y configurar las cuentas de cabecera disponibles.
</div>

<app-crud-empty-state
  *ngIf="selectedPerfilId"
  [loading]="store.loading()"
  [error]="store.loadError()"
  [empty]="!store.loading() && !store.loadError() && store.filtered().length === 0 && !store.search()"
  [searchEmpty]="!store.loading() && !store.loadError() && !!store.search() && store.filtered().length === 0"
  loadingText="Cargando cuentas..."
  errorText="No se pudieron cargar las cuentas."
  emptyText="Este perfil aún no tiene cuentas de cabecera configuradas."
  (retry)="loadCuentas()">
  <ng-container emptyAction>
    <a (click)="openForm()">Agregar la primera cuenta</a>
  </ng-container>
</app-crud-empty-state>

<!-- ── Tabla ───────────────────────────────────────────────── -->
<ng-template #asociadaCol let-c>
  <app-status-badge [type]="c.U_CuentaAsociada === 'Y' ? 'success' : 'neutral'" [pill]="true">
    {{ c.U_CuentaAsociada === 'Y' ? 'Sí' : 'No' }}
  </app-status-badge>
</ng-template>

<app-data-table
  *ngIf="selectedPerfilId && !store.loading() && store.filtered().length > 0"
  [items]="store.paged()"
  [loading]="store.loading()"
  [config]="tableConfig"
  [page]="store.page()"
  [limit]="store.limit()"
  [total]="store.filtered().length"
  [totalPages]="store.totalPages()"
  (pageChange)="onPageChange($event)"
  (limitChange)="onLimitChange($event)"
  (action)="onTableAction($event)">
</app-data-table>
