<div class="dashboard">

  <!-- ── Encabezado ────────────────────────────────────── -->
  <div class="page-header">
    <div>
      <h1 class="title">Dashboard</h1>
      <p class="subtitle">Bienvenido de vuelta, <strong>{{ userName }}</strong></p>
    </div>
    <div class="header-date">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8"  y1="2" x2="8"  y2="6"/>
        <line x1="3"  y1="10" x2="21" y2="10"/>
      </svg>
      {{ today }}
    </div>
  </div>

  <!-- ── KPI Cards ─────────────────────────────────────── -->
  <div class="kpi-grid">
    <div class="kpi-card" *ngFor="let k of kpis">
      <div class="kpi-icon-wrap" [class]="'kpi-icon-wrap--' + k.theme">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" [innerHTML]="k.svg"></svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-label">{{ k.title }}</span>
        <span class="kpi-value">{{ k.value }}</span>
      </div>
      <div class="kpi-trend" [class.up]="k.trend > 0" [class.down]="k.trend < 0" *ngIf="k.trend !== 0">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path *ngIf="k.trend > 0" d="M18 15l-6-6-6 6"/>
          <path *ngIf="k.trend < 0" d="M6 9l6 6 6-6"/>
        </svg>
        {{ k.trend > 0 ? '+' : '' }}{{ k.trend }}%
      </div>
    </div>
  </div>

  <!-- ── Acceso rápido ──────────────────────────────────── -->
  <div class="section-header">
    <h2 class="section-title">Acceso rápido</h2>
  </div>

  <div class="shortcuts-grid">
    <a class="shortcut-card" *ngFor="let s of shortcuts" [routerLink]="s.route">
      <div class="shortcut-icon" [class]="'shortcut-icon--' + s.theme">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" [innerHTML]="s.svg"></svg>
      </div>
      <div class="shortcut-body">
        <span class="shortcut-name">{{ s.name }}</span>
        <span class="shortcut-desc">{{ s.desc }}</span>
      </div>
      <svg class="shortcut-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </a>
  </div>

  <!-- ── Estado del sistema ─────────────────────────────── -->
  <div class="section-header">
    <h2 class="section-title">Estado del sistema</h2>
  </div>

  <div class="status-grid">
    <div class="status-card" *ngFor="let s of statusItems">
      <div class="status-dot" [class]="s.status"></div>
      <span class="status-name">{{ s.name }}</span>
      <span class="status-badge" [class]="s.status">{{ s.label }}</span>
    </div>
  </div>

</div>
