<app-crud-page-header
  title="Dimensiones"
  subtitle="Administra las dimensiones para normas de reparto en modo OFFLINE."
  [actionLabel]="isAdmin ? '+ Nueva Dimensión' : null"
  (actionClick)="openNew()">
</app-crud-page-header>

<!-- ── Modal ─────────────────────────────────────────────────── -->
<app-form-modal
  [title]="'Dimensión'"
  [subtitle]="editingDimension ? (editingDimension.code | number) : null"
  [isOpen]="showForm"
  [loading]="isSaving"
  [isEditing]="editingDimension !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid || !isDirty"
  (save)="save()"
  (cancel)="closeForm()">
  
  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      <div class="modal-body">
        <app-form-field 
          label="Código" 
          [required]="true"
          controlName="code"
          hint="Código único de la dimensión"
          errorMessage="El código es obligatorio">
          <input type="text" formControlName="code"
            placeholder="DIM01" maxlength="50" autocomplete="off"
            [attr.disabled]="editingDimension !== null ? true : null" />
        </app-form-field>

        <app-form-field 
          label="Nombre" 
          [required]="true"
          controlName="name"
          errorMessage="El nombre es obligatorio">
          <input type="text" formControlName="name"
            placeholder="Nombre de la dimensión" maxlength="100" autocomplete="off" />
        </app-form-field>

        <app-form-field 
          label="Estado"
          controlName="activa"
          hint="Las dimensiones activas pueden usarse en normas">
          <div class="toggle-wrapper">
            <label class="u-toggle">
              <input type="checkbox" formControlName="activa" />
              <span class="u-toggle-slider"></span>
            </label>
            <span class="toggle-status" [class.active]="form.get('activa')?.value">
              {{ form.get('activa')?.value ? 'ACTIVA' : 'INACTIVA' }}
            </span>
          </div>
        </app-form-field>
      </div>
    </form>
  </ng-template>

  <ng-template #formFooter>
    <ng-container *ngIf="isDirty; else noChangesFooter">
      <button type="button" class="btn btn-ghost" (click)="closeForm()" [disabled]="isSaving">
        Cancelar
      </button>
      <button type="button" 
        class="btn btn-primary"
        [disabled]="form.invalid || isSaving"
        (click)="save()">
        <span *ngIf="isSaving">Guardando...</span>
        <span *ngIf="!isSaving">{{ editingDimension ? '💾 Guardar cambios' : 'Crear Dimensión' }}</span>
      </button>
    </ng-container>
    <ng-template #noChangesFooter>
      <button type="button" class="btn btn-ghost" (click)="closeForm()">Cerrar</button>
    </ng-template>
  </ng-template>
</app-form-modal>

<!-- ── Filtros ── -->
<app-dimensiones-filters
  [search]="store.search()"
  [filterActiva]="filterActiva"
  [estadoOptions]="estadoOptions"
  [count]="store.filtered().length"
  [loading]="store.loading()"
  (searchChange)="onSearchChange($event)"
  (estadoChange)="onFilterActivaChange($event)"
  (reset)="onSearchCleared()">
</app-dimensiones-filters>

<app-crud-empty-state
  [loading]="store.loading()"
  [error]="store.loadError()"
  [empty]="!store.loading() && !store.loadError() && store.filtered().length === 0"
  [searchEmpty]="!store.loading() && !store.loadError() && !!store.search() && store.filtered().length === 0"
  loadingText="Cargando dimensiones..."
  errorText="Error al cargar los datos."
  emptyText="No hay dimensiones registradas."
  (retry)="load()">
  <ng-container emptyAction>
    <a *ngIf="isAdmin" (click)="openNew()">Crear la primera</a>
  </ng-container>
</app-crud-empty-state>

<!-- ── Tabla ── -->
<ng-template #codeCol let-item>
  <span class="code-tag">{{ item.code }}</span>
</ng-template>
<ng-template #nameCol let-item>
  {{ item.name }}
</ng-template>
<ng-template #estadoCol let-item>
  <app-status-badge [type]="item.activa ? 'success' : 'neutral'" [dot]="true">
    {{ item.activa ? 'Activa' : 'Inactiva' }}
  </app-status-badge>
</ng-template>

<app-data-table
  *ngIf="!store.loading() && !store.loadError() && store.filtered().length > 0"
  [items]="store.paged()"
  [loading]="store.loading()"
  [config]="tableConfig"
  [page]="store.page()"
  [limit]="store.limit()"
  [total]="store.filtered().length"
  [totalPages]="store.totalPages()"
  [rowClassFn]="rowClassFn"
  (pageChange)="onPageChange($event)"
  (limitChange)="onLimitChange($event)"
  (action)="onTableAction($event)">
</app-data-table>
