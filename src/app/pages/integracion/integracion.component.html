<!-- Header -->
<app-integracion-header 
  [isAdmin]="isAdmin" 
  (refresh)="load()">
</app-integracion-header>

<!-- Estado carga -->
<app-integracion-loading *ngIf="loading"></app-integracion-loading>

<!-- Estado error -->
<app-integracion-error 
  *ngIf="!loading && loadError" 
  (retry)="load()">
</app-integracion-error>

<ng-container *ngIf="!loading && !loadError">

  <!-- Barra de filtros -->
  <app-integracion-filter-bar
    [search]="search"
    [count]="filtered.length"
    (searchChange)="onSearchChange($event)"
    (searchCleared)="onSearchCleared()">
  </app-integracion-filter-bar>

  <!-- Estado vacio -->
  <app-integracion-empty
    *ngIf="filtered.length === 0"
    [isAdmin]="isAdmin"
    [puedeSync]="puedeSync"
    [search]="search">
  </app-integracion-empty>

  <!-- Vista ADMIN/SYNC: tabla con acciones de sincronizacion -->
  <app-integracion-pendientes-table
    *ngIf="(isAdmin || puedeSync) && filtered.length > 0"
    [items]="pendientesPaged"
    [page]="page"
    [limit]="limit"
    [total]="filtered.length"
    [totalPages]="totalPages"
    (pageChange)="onPageChange($event)"
    (limitChange)="onLimitChange($event)"
    (actionClick)="onPendientesAction($event)">
  </app-integracion-pendientes-table>

  <!-- Vista USER: tabla de solo lectura con doc SAP -->
  <app-integracion-user-table
    *ngIf="!isAdmin && !puedeSync && filtered.length > 0"
    [items]="userPaged"
    [page]="page"
    [limit]="limit"
    [total]="filtered.length"
    [totalPages]="totalPages"
    (pageChange)="onPageChange($event)"
    (limitChange)="onLimitChange($event)"
    (actionClick)="onUserAction($event)">
  </app-integracion-user-table>

</ng-container>

<!-- Modal de sincronizacion -->
<app-sync-modal #syncModal (syncComplete)="onSyncComplete($event)"></app-sync-modal>

<!-- Modal historial -->
<app-integracion-historial-modal
  [isOpen]="showHistorial"
  [loading]="loadingHistorial"
  [items]="historialItems"
  [historialRend]="historialRend"
  (close)="closeHistorial()">
</app-integracion-historial-modal>
