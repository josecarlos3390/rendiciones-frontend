<app-crud-page-header
  title="Normas de Reparto"
  subtitle="Administra las normas para distribución de importes en modo OFFLINE."
  [actionLabel]="isAdmin ? '+ Nueva Norma' : null"
  (actionClick)="openNew()">
</app-crud-page-header>

<!-- ── Modal con FormModalComponent ─────────────────────────── -->
<app-form-modal
  [title]="'Norma'"
  [subtitle]="editingNorma ? editingNorma.factorCode : null"
  [isOpen]="showForm"
  [loading]="isSaving"
  [isEditing]="editingNorma !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid || !isDirty"
  (save)="save()"
  (cancel)="closeForm()">
  
  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      
      <app-form-field 
        label="Código Factor" 
        [required]="true"
        controlName="factorCode"
        hint="Código único del factor (ej: ADM, VTA, PROD)">
        <input type="text" formControlName="factorCode"
          placeholder="ADM" maxlength="50" autocomplete="off"
          [attr.disabled]="editingNorma !== null ? true : null" />
      </app-form-field>

      <app-form-field 
        label="Descripción" 
        [required]="true"
        controlName="descripcion">
        <input type="text" formControlName="descripcion"
          placeholder="Distribución Administración" maxlength="250" autocomplete="off" />
      </app-form-field>

      <app-form-field 
        label="Dimensión" 
        [required]="true"
        controlName="dimension"
        hint="Dimensión asociada a esta norma de reparto">
        <select formControlName="dimension" [compareWith]="compareDimension">
          <option [ngValue]="null">Seleccione una dimensión</option>
          <option *ngFor="let d of dimensionesActivas" [ngValue]="d.code">
            {{ d.code }} - {{ d.name }}
          </option>
        </select>
      </app-form-field>

      <app-form-field 
        label="Activa"
        hint="Las normas activas pueden usarse en rendiciones">
        <div class="toggle-wrapper">
          <label class="u-toggle">
            <input type="checkbox" formControlName="activa" />
            <span class="u-toggle-slider"></span>
          </label>
          <span class="toggle-status" [class.active]="form.get('activa')?.value">
            {{ form.get('activa')?.value ? 'ACTIVA' : 'INACTIVA' }}
          </span>
        </div>
      </app-form-field>

    </form>
  </ng-template>

  <!-- Footer personalizado con lógica de dirty -->
  <ng-template #formFooter>
    <ng-container *ngIf="isDirty; else noChangesFooter">
      <button type="button" class="btn btn-ghost" (click)="closeForm()" [disabled]="isSaving">
        Cancelar
      </button>
      <button type="button" 
        class="btn btn-primary"
        [disabled]="form.invalid || isSaving"
        (click)="save()">
        <span *ngIf="isSaving">Guardando...</span>
        <span *ngIf="!isSaving">{{ editingNorma ? '💾 Guardar cambios' : 'Crear Norma' }}</span>
      </button>
    </ng-container>
    <ng-template #noChangesFooter>
      <button type="button" class="btn btn-ghost" (click)="closeForm()">Cerrar</button>
    </ng-template>
  </ng-template>
</app-form-modal>

<!-- ── Filtros ── -->
<app-normas-filters
  [search]="store.search()"
  [filterActiva]="filterActiva"
  [estadoOptions]="estadoOptions"
  [count]="store.filtered().length"
  [loading]="store.loading()"
  (searchChange)="onSearchChange($event)"
  (estadoChange)="onFilterActivaChange($event)"
  (reset)="onSearchCleared()">
</app-normas-filters>

<app-crud-empty-state
  [loading]="store.loading()"
  [error]="store.loadError()"
  [empty]="!store.loading() && !store.loadError() && store.filtered().length === 0"
  [searchEmpty]="!store.loading() && !store.loadError() && !!store.search() && store.filtered().length === 0"
  loadingText="Cargando normas..."
  errorText="Error al cargar las normas."
  emptyText="No hay normas registradas."
  (retry)="load()">
  <ng-container emptyAction>
    <a *ngIf="isAdmin" (click)="openNew()">Crear la primera</a>
  </ng-container>
</app-crud-empty-state>

<!-- ── Tabla ── -->
<ng-template #codeCol let-item>
  <span class="code-tag">{{ item.factorCode }}</span>
</ng-template>
<ng-template #descCol let-item>
  {{ item.descripcion }}
</ng-template>
<ng-template #dimensionCol let-item>
  {{ item.dimensionName || '—' }}
</ng-template>
<ng-template #estadoCol let-item>
  <app-status-badge [type]="item.activa ? 'success' : 'neutral'" [dot]="true">
    {{ item.activa ? 'Activa' : 'Inactiva' }}
  </app-status-badge>
</ng-template>

<app-data-table
  *ngIf="loadingState === 'success'"
  [items]="store.paged()"
  [loading]="store.loading()"
  [config]="tableConfig"
  [page]="store.page()"
  [limit]="store.limit()"
  [total]="store.filtered().length"
  [totalPages]="store.totalPages()"
  [rowClassFn]="rowClassFn"
  (pageChange)="onPageChange($event)"
  (limitChange)="onLimitChange($event)"
  (action)="onTableAction($event)">
</app-data-table>
