<div class="page-header">
  <div class="page-title-group">
    <h2>Normas de Reparto</h2>
    <p class="page-subtitle">Administra las normas para distribución de importes en modo OFFLINE.</p>
  </div>
  <button *ngIf="isAdmin" class="btn btn-primary btn-sm" (click)="openNew()">+ Nueva Norma</button>
</div>

<app-confirm-dialog [config]="dialogConfig" [visible]="showDialog"
  (confirmed)="onDialogConfirm()" (cancelled)="onDialogCancel()">
</app-confirm-dialog>

<!-- ── Modal con FormModalComponent ─────────────────────────── -->
<app-form-modal
  [title]="'Norma'"
  [subtitle]="editingNorma ? editingNorma.factorCode : null"
  [isOpen]="showForm"
  [loading]="isSaving"
  [isEditing]="editingNorma !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid || !isDirty"
  (save)="save()"
  (cancel)="closeForm()">
  
  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      
      <app-form-field 
        label="Código Factor" 
        [required]="true"
        controlName="factorCode"
        hint="Código único del factor (ej: ADM, VTA, PROD)">
        <input type="text" formControlName="factorCode"
          placeholder="ADM" maxlength="50" autocomplete="off"
          [attr.disabled]="editingNorma !== null ? true : null" />
      </app-form-field>

      <app-form-field 
        label="Descripción" 
        [required]="true"
        controlName="descripcion">
        <input type="text" formControlName="descripcion"
          placeholder="Distribución Administración" maxlength="250" autocomplete="off" />
      </app-form-field>

      <app-form-field 
        label="Dimensión" 
        [required]="true"
        controlName="dimension"
        hint="Dimensión asociada a esta norma de reparto">
        <select formControlName="dimension" [compareWith]="compareDimension">
          <option [ngValue]="null">Seleccione una dimensión</option>
          <option *ngFor="let d of dimensionesActivas" [ngValue]="d.code">
            {{ d.code }} - {{ d.name }}
          </option>
        </select>
      </app-form-field>

      <app-form-field 
        label="Activa"
        hint="Las normas activas pueden usarse en rendiciones">
        <div class="toggle-wrapper">
          <label class="u-toggle">
            <input type="checkbox" formControlName="activa" />
            <span class="u-toggle-slider"></span>
          </label>
          <span class="toggle-status" [class.active]="form.get('activa')?.value">
            {{ form.get('activa')?.value ? 'ACTIVA' : 'INACTIVA' }}
          </span>
        </div>
      </app-form-field>

    </form>
  </ng-template>

  <!-- Footer personalizado con lógica de dirty -->
  <ng-template #formFooter>
    <ng-container *ngIf="isDirty; else noChangesFooter">
      <button type="button" class="btn btn-ghost" (click)="closeForm()" [disabled]="isSaving">
        Cancelar
      </button>
      <button type="button" 
        class="btn btn-primary"
        [disabled]="form.invalid || isSaving"
        (click)="save()">
        <span *ngIf="isSaving">Guardando...</span>
        <span *ngIf="!isSaving">{{ editingNorma ? '💾 Guardar cambios' : 'Crear Norma' }}</span>
      </button>
    </ng-container>
    <ng-template #noChangesFooter>
      <button type="button" class="btn btn-ghost" (click)="closeForm()">Cerrar</button>
    </ng-template>
  </ng-template>
</app-form-modal>

<!-- ── Filtros ── -->
<app-normas-filters
  [search]="search"
  [filterActiva]="filterActiva"
  [estadoOptions]="estadoOptions"
  [count]="filtered.length"
  [loading]="loadingState === 'loading'"
  (searchChange)="onSearchChange($event)"
  (estadoChange)="onFilterActivaChange($event)"
  (reset)="onSearchCleared()">>
</app-normas-filters>

<!-- ── Loading / Error / Empty ── -->
<app-loading-state
  *ngIf="loadingState !== 'success'"
  [state]="loadingState"
  errorMessage="Error al cargar las normas"
  emptyMessage="No hay normas registradas"
  (retry)="load()">
</app-loading-state>

<!-- ── Tabla ── -->
<app-normas-table
  *ngIf="loadingState === 'success'"
  [items]="paged"
  [page]="page"
  [totalPages]="totalPages"
  [isReadonly]="!isAdmin"
  (pageChange)="onPageChange($event)"
  (edit)="openEdit($event)"
  (delete)="confirmDelete($event)">
</app-normas-table>
