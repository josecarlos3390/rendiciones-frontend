<app-crud-page-header
  title="Gestión de Proyectos"
  subtitle="Administra los proyectos disponibles para asignar en las rendiciones."
  [actionLabel]="isAdmin ? '+ Nuevo Proyecto' : null"
  (actionClick)="openNew()">
</app-crud-page-header>

<!-- ── Modal ─────────────────────────────────────────────────── -->
<app-form-modal
  [title]="'Proyecto'"
  [subtitle]="editingProyecto ? editingProyecto.code : null"
  [isOpen]="showForm"
  [loading]="isSaving"
  [isEditing]="editingProyecto !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid || !isDirty"
  (save)="save()"
  (cancel)="closeForm()">
  
  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      <div class="modal-body">
        <app-form-field 
          label="Código" 
          [required]="true"
          controlName="code"
          hint="Código único del proyecto"
          errorMessage="El código es obligatorio">
          <input type="text" formControlName="code"
            placeholder="PRY001" maxlength="50" autocomplete="off"
            [attr.disabled]="editingProyecto !== null ? true : null" />
        </app-form-field>

        <app-form-field 
          label="Nombre" 
          [required]="true"
          controlName="name"
          errorMessage="El nombre es obligatorio">
          <input type="text" formControlName="name"
            placeholder="Nombre del proyecto" maxlength="100" autocomplete="off" />
        </app-form-field>

        <app-form-field 
          label="Estado"
          controlName="activo"
          hint="Los proyectos activos pueden usarse en rendiciones">
          <div class="toggle-wrapper">
            <label class="u-toggle">
              <input type="checkbox" formControlName="activo" />
              <span class="u-toggle-slider"></span>
            </label>
            <span class="toggle-status" [class.active]="form.get('activo')?.value">
              {{ form.get('activo')?.value ? 'ACTIVO' : 'INACTIVO' }}
            </span>
          </div>
        </app-form-field>
      </div>
    </form>
  </ng-template>

  <ng-template #formFooter>
    <ng-container *ngIf="isDirty; else noChangesFooter">
      <button type="button" class="btn btn-ghost" (click)="closeForm()" [disabled]="isSaving">
        Cancelar
      </button>
      <button type="button" 
        class="btn btn-primary"
        [disabled]="form.invalid || isSaving"
        (click)="save()">
        <span *ngIf="isSaving">Guardando...</span>
        <span *ngIf="!isSaving">{{ editingProyecto ? '💾 Guardar cambios' : 'Crear Proyecto' }}</span>
      </button>
    </ng-container>
    <ng-template #noChangesFooter>
      <button type="button" class="btn btn-ghost" (click)="closeForm()">Cerrar</button>
    </ng-template>
  </ng-template>
</app-form-modal>

<!-- ── Filtros ── -->
<app-proyectos-filters
  [search]="store.search()"
  [filterActiva]="filterActiva"
  [estadoOptions]="estadoOptions"
  [count]="store.filtered().length"
  [loading]="store.loading()"
  (searchChange)="onSearchChange($event)"
  (estadoChange)="onFilterActivaChange($event)"
  (reset)="onSearchCleared()">
</app-proyectos-filters>

<app-crud-empty-state
  [loading]="store.loading()"
  [error]="store.loadError()"
  [empty]="!store.loading() && !store.loadError() && store.filtered().length === 0"
  [searchEmpty]="!store.loading() && !store.loadError() && !!store.search() && store.filtered().length === 0"
  loadingText="Cargando proyectos..."
  errorText="Error al cargar los datos."
  emptyText="No hay proyectos registrados."
  (retry)="load()">
  <ng-container emptyAction>
    <a *ngIf="isAdmin" (click)="openNew()">Crear el primero</a>
  </ng-container>
</app-crud-empty-state>

<!-- ── Tabla ── -->
<ng-template #codeCol let-item>
  <span class="code-tag">{{ item.code }}</span>
</ng-template>
<ng-template #nameCol let-item>
  {{ item.name }}
</ng-template>
<ng-template #estadoCol let-item>
  <app-status-badge [type]="item.activo ? 'success' : 'neutral'" [dot]="true">
    {{ item.activo ? 'Activo' : 'Inactivo' }}
  </app-status-badge>
</ng-template>

<app-data-table
  *ngIf="!store.loading() && !store.loadError() && store.filtered().length > 0"
  [items]="store.paged()"
  [loading]="store.loading()"
  [config]="tableConfig"
  [page]="store.page()"
  [limit]="store.limit()"
  [total]="store.filtered().length"
  [totalPages]="store.totalPages()"
  [rowClassFn]="rowClassFn"
  (pageChange)="onPageChange($event)"
  (limitChange)="onLimitChange($event)"
  (action)="onTableAction($event)">
</app-data-table>
