<div class="page-header">
  <div class="page-title-group">
    <h2>Gestión de Proyectos</h2>
    <p class="page-subtitle">Administra los proyectos disponibles para asignar en las rendiciones.</p>
  </div>
  <button *ngIf="isAdmin" class="btn btn-primary btn-sm" (click)="openNew()">+ Nuevo Proyecto</button>
</div>

<app-confirm-dialog [config]="dialogConfig" [visible]="showDialog"
  (confirmed)="onDialogConfirm()" (cancelled)="onDialogCancel()">
</app-confirm-dialog>

<!-- ── Modal ─────────────────────────────────────────────────── -->
<app-form-modal
  [title]="'Proyecto'"
  [subtitle]="editingProyecto ? editingProyecto.code : null"
  [isOpen]="showForm"
  [loading]="isSaving"
  [isEditing]="editingProyecto !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid || !isDirty"
  (save)="save()"
  (cancel)="closeForm()">
  
  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      <div class="modal-body">
        <app-form-field 
          label="Código" 
          [required]="true"
          controlName="code"
          hint="Código único del proyecto"
          errorMessage="El código es obligatorio">
          <input type="text" formControlName="code"
            placeholder="PRY001" maxlength="50" autocomplete="off"
            [attr.disabled]="editingProyecto !== null ? true : null" />
        </app-form-field>

        <app-form-field 
          label="Nombre" 
          [required]="true"
          controlName="name"
          errorMessage="El nombre es obligatorio">
          <input type="text" formControlName="name"
            placeholder="Nombre del proyecto" maxlength="100" autocomplete="off" />
        </app-form-field>

        <app-form-field 
          label="Estado"
          controlName="activo"
          hint="Los proyectos activos pueden usarse en rendiciones">
          <div class="toggle-wrapper">
            <label class="u-toggle">
              <input type="checkbox" formControlName="activo" />
              <span class="u-toggle-slider"></span>
            </label>
            <span class="toggle-status" [class.active]="form.get('activo')?.value">
              {{ form.get('activo')?.value ? 'ACTIVO' : 'INACTIVO' }}
            </span>
          </div>
        </app-form-field>
      </div>
    </form>
  </ng-template>

  <ng-template #formFooter>
    <ng-container *ngIf="isDirty; else noChangesFooter">
      <button type="button" class="btn btn-ghost" (click)="closeForm()" [disabled]="isSaving">
        Cancelar
      </button>
      <button type="button" 
        class="btn btn-primary"
        [disabled]="form.invalid || isSaving"
        (click)="save()">
        <span *ngIf="isSaving">Guardando...</span>
        <span *ngIf="!isSaving">{{ editingProyecto ? '💾 Guardar cambios' : 'Crear Proyecto' }}</span>
      </button>
    </ng-container>
    <ng-template #noChangesFooter>
      <button type="button" class="btn btn-ghost" (click)="closeForm()">Cerrar</button>
    </ng-template>
  </ng-template>
</app-form-modal>

<!-- ── Filtros ── -->
<app-proyectos-filters
  [search]="search"
  [filterActivo]="filterActivo"
  [estadoOptions]="estadoOptions"
  [count]="filtered.length"
  [loading]="loading"
  (searchChange)="onSearchChange($event)"
  (estadoChange)="onFilterActivoChange($event)"
  (reset)="onSearchCleared()">>
</app-proyectos-filters>

<!-- ── Loading / Error / Empty ── -->
<div *ngIf="loading" class="empty-state">Cargando proyectos...</div>
<div *ngIf="!loading && loadError" class="empty-state">
  Error al cargar los datos.
  <a (click)="load()">Reintentar</a>
</div>
<div *ngIf="!loading && !loadError && filtered.length === 0" class="empty-state">
  No hay proyectos registrados.
  <a *ngIf="isAdmin" (click)="openNew()">Crear el primero</a>
</div>

<!-- ── Tabla ── -->
<app-proyectos-table
  *ngIf="!loading && !loadError && filtered.length > 0"
  [items]="paged"
  [page]="page"
  [totalPages]="totalPages"
  [isReadonly]="!isAdmin"
  (pageChange)="onPageChange($event)"
  (edit)="openEdit($event)"
  (delete)="confirmDelete($event)">
</app-proyectos-table>
