<app-crud-page-header
  title="Mapeo de Campos SAP"
  subtitle="Configurá qué campos de SAP B1 reciben los datos de las rendiciones al sincronizar"
  actionLabel="+ Nuevo Campo"
  (actionClick)="openCreate()">
</app-crud-page-header>

<!-- Modal formulario -->
<app-form-modal
  [title]="'Campo de Mapeo'"
  [subtitle]="editingItem?.U_Descripcion ?? null"
  [isOpen]="showForm"
  [loading]="isSaving"
  [isEditing]="editingItem !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid || !isDirty"
  (save)="save()"
  (cancel)="closeForm()">

  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      <div class="info-banner info-neutral" style="margin-bottom: 16px">
        <span>ℹ</span>
        <span>
          <strong>Descripción</strong> es el nombre legible del campo (ej: "Número de Factura").<br>
          <strong>Campo SAP</strong> es el nombre técnico del campo en SAP B1 donde se migrarán los datos (ej: <code>DocNum</code>, <code>U_CUF</code>).
        </span>
      </div>

      <app-form-field
        label="Descripción"
        [required]="true"
        hint="Nombre legible del campo"
        errorMessage="Obligatorio, máx. 100 caracteres"
        controlName="descripcion"
        [showChanged]="!!editingItem"
        [initialValue]="initialValues?.['descripcion']">
        <input
          type="text"
          formControlName="descripcion"
          maxlength="100"
          placeholder="Ej: Número de Factura, NIT Proveedor, CUF..."
          autocomplete="off" />
      </app-form-field>

      <app-form-field
        label="Campo SAP B1"
        [required]="true"
        hint="Nombre exacto del campo en el documento SAP donde se va a migrar el dato"
        errorMessage="Obligatorio, máx. 100 caracteres"
        controlName="campo"
        [showChanged]="!!editingItem"
        [initialValue]="initialValues?.['campo']">
        <input
          type="text"
          formControlName="campo"
          maxlength="100"
          placeholder="Ej: DocNum, CardCode, U_CUF, U_NIT..."
          autocomplete="off"
          class="font-mono" />
      </app-form-field>
    </form>
  </ng-template>

  <ng-template #formFooter>
    <button type="button" class="btn btn-ghost" (click)="closeForm()" [disabled]="isSaving">
      Cancelar
    </button>
    <button type="button" class="btn btn-primary" (click)="save()" [disabled]="form.invalid || !isDirty || isSaving">
      <span *ngIf="isSaving">Guardando...</span>
      <span *ngIf="!isSaving">{{ editingItem ? '💾 Guardar cambios' : 'Crear Campo' }}</span>
    </button>
  </ng-template>
</app-form-modal>

<app-crud-empty-state
  [loading]="store.loading()"
  [error]="store.loadError()"
  [empty]="!store.loadError() && store.filtered().length === 0"
  errorText="No se pudo cargar la lista."
  emptyText="No hay campos de mapeo configurados."
  (retry)="load()">
  <ng-container emptyAction>
    <a (click)="openCreate()">Crear el primero</a>
  </ng-container>
</app-crud-empty-state>

<!-- Tabla -->
<ng-template #campoCol let-item>
  <code class="campo-tag">{{ item.U_Campo }}</code>
</ng-template>

<app-data-table
  *ngIf="!store.loading() && !store.loadError() && store.filtered().length > 0"
  [items]="store.paged()"
  [config]="tableConfig"
  (action)="onTableAction($event)">
</app-data-table>
