<app-skeleton-loader *ngIf="loading" variant="table" [rows]="3"></app-skeleton-loader>

<app-empty-state
  *ngIf="!loading && items.length === 0"
  icon="users"
  title="No hay rendiciones de subordinados"
  message="No se encontraron rendiciones de tus subordinados con los filtros seleccionados."
  [compact]="true">
</app-empty-state>

<div class="table-wrapper" *ngIf="!loading && items.length > 0">
  <table class="data-table">
    <thead>
      <tr>
        <th class="text-center">N°</th>
        <th>Usuario</th>
        <th>Objetivo</th>
        <th>Cuenta</th>
        <th class="text-center">Fecha Fin</th>
        <th class="text-right">Monto</th>
        <th class="text-center">Estado</th>
        <th class="col-acciones" title="Acciones">
          <app-table-action-header />
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of items; trackBy: trackByRendicion">
        <td class="text-center col-id" data-label="N°">{{ r.U_IdRendicion }}</td>
        <td data-label="Usuario">
          <span class="user-pill">{{ r.U_NomUsuario }}</span>
        </td>
        <td class="col-objetivo" data-label="Objetivo">{{ r.U_Objetivo }}</td>
        <td class="col-cuenta" data-label="Cuenta">
          <div class="cuenta-inner">
            <span class="code-tag">{{ r.U_Cuenta }}</span>
            <span class="cuenta-nombre">{{ r.U_NombreCuenta }}</span>
          </div>
        </td>
        <td class="text-center" data-label="Fecha Fin">{{ r.U_FechaFinal | ddmmyyyy }}</td>
        <td class="text-right col-monto" data-label="Monto">{{ r.U_Monto | number:'1.2-2' }}</td>
        <td class="text-center" data-label="Estado">
          <span [class]="estadoCss(r.U_Estado)">{{ estadoTexto(r.U_Estado) }}</span>
        </td>
        <td class="col-acciones" data-label="Acciones">
          <div class="acciones-wrap">
            <app-action-menu
              [actions]="getActionItems(r)"
              [itemLabel]="'Rendición N° ' + r.U_IdRendicion"
              (actionClick)="onActionClick($event, r)">
            </app-action-menu>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <app-paginator
    [page]="page"
    [limit]="limit"
    [total]="total"
    [totalPages]="totalPages"
    (pageChange)="pageChange.emit($event)"
    (limitChange)="limitChange.emit($event)">
  </app-paginator>
</div>
