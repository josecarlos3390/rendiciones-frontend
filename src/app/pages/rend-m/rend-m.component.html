<app-crud-page-header
  title="Cabeceras de Rendición"
  actionLabel="+ Nueva Rendición"
  (actionClick)="perfilActivo ? openNew() : openPerfilPicker()">
  <ng-container headerActions>
    <div class="perfil-activo-badge" *ngIf="perfilActivo">
      <span class="perfil-activo-badge__label">Perfil:</span>
      <span class="perfil-activo-badge__nombre">{{ permisoActivo?.U_NOMBREPERFIL }}</span>
      <button class="perfil-activo-badge__change" type="button"
        title="Cambiar perfil" (click)="openPerfilPicker()">↺ Cambiar</button>
    </div>
  </ng-container>
</app-crud-page-header>

<!-- ════ Modal: Selector de Perfil ════ -->
<app-picker-modal
  [title]="'Seleccionar Perfil de Trabajo'"
  [isOpen]="showPerfilPicker"
  [loading]="loadingMisPerfiles"
  [items]="perfilPickerItems"
  [selectedId]="perfilPickerSelId"
  [hint]="'Seleccioná el perfil para ver y crear rendiciones:'"
  [emptyIcon]="'👤'"
  [emptyTitle]="'Sin perfiles asignados'"
  [emptyMessage]="'No tenés perfiles asignados. Contactá al administrador para que te asigne uno.'"
  (confirm)="onPerfilConfirm($event)"
  (cancel)="cancelPerfilPicker()">
</app-picker-modal>

<!-- ════ Modal: Formulario nueva / editar rendición ════ -->
<app-rendicion-form
  [isOpen]="showForm"
  [isSaving]="isSaving"
  [editingRend]="editingRend"
  [permisoActivo]="permisoActivo"
  [cuentasCabecera]="cuentasCabeceraActivas"
  [fijarSaldo]="fijarSaldo"
  [cuentaEsAsociada]="cuentaEsAsociada"
  [filtroEmpleadoCar]="filtroEmpleadoCar"
  [filtroEmpleado]="filtroEmpleado"
  [editingPerfilNombre]="editingPerfilNombre"
  [initialCuenta]="form.get('cuenta')?.value ?? ''"
  [initialNombreCuenta]="form.get('nombreCuenta')?.value ?? ''"
  (save)="onSaveRendicion($event)"
  (cancel)="closeForm()"
  (empleadoChange)="onEmpleadoSelected($event)"
  (cuentaChange)="onCuentaChange($event)">
</app-rendicion-form>

<!-- ════ PASO 1: Sin perfil — pantalla de selección ════ -->
<app-perfil-selector
  *ngIf="!perfilActivo"
  [loading]="loadingPerfilesPaso1"
  [permisos]="misPermisosPaso1"
  (select)="seleccionarPerfilDirecto($event)">
</app-perfil-selector>

<!-- ════ PASO 2: Perfil seleccionado — filtros + tabla ════ -->
<ng-container *ngIf="perfilActivo">

  <!-- ── Barra de filtros unificada ─────────────────────────────────── -->
  <app-rendicion-filters
    [verFiltro]="verFiltro"
    [estadoFiltro]="estadoFiltro"
    [search]="search"
    [totalPropias]="filtered.length"
    [totalSubordinados]="totalSubordinados"
    [loading]="loading"
    [loadingSubordinados]="loadingSubordinados"
    [esAprobador]="auth.esAprobador"
    [sinAprobador]="auth.sinAprobador"
    [isAdmin]="auth.isAdmin"
    (verFiltroChange)="onVerFiltroChange($event)"
    (estadoFiltroChange)="onEstadoFiltroChange($event)"
    (searchChange)="onSearchChange($event)"
    (searchCleared)="onSearchCleared()">
  </app-rendicion-filters>

  <!-- Estado de carga -->
  <app-skeleton-loader *ngIf="loading" variant="table" [rows]="5"></app-skeleton-loader>
  
  <!-- Error de carga -->
  <app-empty-state
    *ngIf="!loading && loadError"
    icon="inbox"
    title="Error al cargar"
    message="No se pudo cargar la lista de rendiciones. Intentá de nuevo."
    [showAction]="true"
    actionText="Reintentar"
    (action)="load()">
  </app-empty-state>
  
  <!-- Estado vacío según filtro -->
  <app-empty-state
    *ngIf="!loading && !loadError && filtered.length === 0 && estadoFiltro === 'abiertas'"
    icon="folder"
    title="No hay rendiciones abiertas"
    message="No tenés rendiciones pendientes en este perfil."
    [showAction]="true"
    actionText="Crear la primera"
    (action)="openNew()">
  </app-empty-state>
  
  <app-empty-state
    *ngIf="!loading && !loadError && filtered.length === 0 && estadoFiltro === 'cerradas'"
    icon="check"
    title="No hay rendiciones cerradas"
    message="No tenés rendiciones cerradas en este perfil.">
  </app-empty-state>
  
  <app-empty-state
    *ngIf="!loading && !loadError && filtered.length === 0 && estadoFiltro === 'enviadas'"
    icon="inbox"
    title="No hay rendiciones enviadas"
    message="No tenés rendiciones enviadas para aprobación.">
  </app-empty-state>
  
  <app-empty-state
    *ngIf="!loading && !loadError && filtered.length === 0 && estadoFiltro === 'aprobadas'"
    icon="check"
    title="No hay rendiciones aprobadas"
    message="No tenés rendiciones aprobadas en este perfil.">
  </app-empty-state>
  
  <app-empty-state
    *ngIf="!loading && !loadError && filtered.length === 0 && estadoFiltro === 'sincronizadas'"
    icon="chart"
    title="No hay rendiciones sincronizadas"
    message="No tenés rendiciones sincronizadas con SAP.">
  </app-empty-state>
  
  <app-empty-state
    *ngIf="!loading && !loadError && filtered.length === 0 && estadoFiltro === 'error'"
    icon="inbox"
    title="No hay rendiciones con error"
    message="No tenés rendiciones con error de sincronización.">
  </app-empty-state>
  
  <app-empty-state
    *ngIf="!loading && !loadError && filtered.length === 0 && estadoFiltro === 'todas'"
    icon="folder"
    title="No hay rendiciones"
    message="Este perfil aún no tiene rendiciones creadas."
    [showAction]="true"
    actionText="Crear la primera"
    (action)="openNew()">
  </app-empty-state>

  <!-- ── Tabla principal (propias / todas) ─────────────────────────── -->
  <app-rendicion-table
    *ngIf="verFiltro !== 'subordinados' && !loading && !loadError && filtered.length > 0"
    [rendiciones]="filtered"
    [paged]="paged"
    [page]="page"
    [limit]="limit"
    [totalPages]="totalPages"
    [estadoFiltro]="estadoFiltro"
    [isAdmin]="isAdmin"
    [esAprobador]="auth.esAprobador"
    [canSyncDirecto]="(auth.isAdmin || auth.esAprobador || auth.sinAprobador) && auth.puedeGenerarPre"
    [canEnviar]="!!auth.nomSup"
    (action)="onTableAction($event)"
    (pageChange)="onPageChange($event)">
  </app-rendicion-table>

  <!-- ── Tabla subordinados (subordinados / todas) ───────────────────── -->
  <ng-container *ngIf="verFiltro !== 'propias' && (auth.esAprobador || auth.sinAprobador || auth.isAdmin)">

    <!-- Separador visual cuando se muestran ambas -->
    <div *ngIf="verFiltro === 'todas' && filtered.length > 0" class="section-divider">
      <span>Rendiciones de subordinados</span>
    </div>

    <app-subordinados-table
      [items]="rendicionesSubordinados"
      [loading]="loadingSubordinados"
      [page]="pageSubordinados"
      [limit]="limit"
      [total]="totalSubordinados"
      [totalPages]="totalPagesSubordinados"
      [getActionItems]="getActionMenuItemsSubordinados"
      (actionClick)="onActionClickSubordinados($event.action, $event.item)"
      (pageChange)="onPageSubordinadosChange($event)"
      (limitChange)="onLimitChange($event)">
    </app-subordinados-table>

  </ng-container>

</ng-container>

<!-- ── Modal Reimpresión desde lista ── -->
<app-rendicion-pdf-preview
  *ngIf="showPdfReprint && pdfReprintRend"
  [rend]="pdfReprintRend!"
  [docs]="pdfReprintDocs"
  mode="reprint"
  (cancel)="onPdfReprintClose()">
</app-rendicion-pdf-preview>

<!-- ── Modal Sincronización (Componente Compartido) ── -->
<app-sync-modal 
  #syncModal
  (syncComplete)="onSyncComplete($event)">
</app-sync-modal>
