<app-crud-page-header
  title="Tipo de Cambio"
  subtitle="Administra las tasas de cambio en modo OFFLINE."
  actionLabel="+ Nueva Tasa"
  (actionClick)="openCreate()">
</app-crud-page-header>

<!-- Estado OFFLINE -->
<div *ngIf="isOffline" class="alert alert-info">
  <strong>Modo OFFLINE:</strong> Gestión de tasas de cambio locales.
</div>

<!-- ── Filtros ── -->
<app-tipo-cambio-filters
  [monedaOptions]="monedaOptions"
  [filterMoneda]="filterMoneda"
  [filterFechaDesde]="filterFechaDesde"
  [filterFechaHasta]="filterFechaHasta"
  [count]="store.filtered().length"
  [loading]="store.loading()"
  (monedaChange)="onMonedaChange($event)"
  (fechaDesdeChange)="onFechaDesdeChange($event)"
  (fechaHastaChange)="onFechaHastaChange($event)"
  (reset)="onResetFilters()">
</app-tipo-cambio-filters>

<app-crud-empty-state
  [loading]="store.loading()"
  [error]="store.loadError()"
  [empty]="!store.loading() && !store.loadError() && store.filtered().length === 0"
  loadingText="Cargando tasas de cambio..."
  errorText="Error al cargar los datos."
  emptyText="No hay tasas de cambio registradas."
  (retry)="loadTasas()">
  <ng-container emptyAction>
    <a (click)="openCreate()">Crear la primera</a>
  </ng-container>
</app-crud-empty-state>

<!-- ── Tabla ── -->
<ng-template #fechaCol let-item>
  {{ item.fecha | date:'dd/MM/yyyy' }}
</ng-template>
<ng-template #monedaCol let-item>
  <span class="code-tag">{{ item.moneda }}</span>
</ng-template>
<ng-template #tasaCol let-item>
  {{ formatTasa(item.tasa) }}
</ng-template>
<ng-template #estadoCol let-item>
  <app-status-badge [type]="item.activo === 'Y' ? 'success' : 'neutral'" [dot]="true">
    {{ item.activo === 'Y' ? 'Activo' : 'Inactivo' }}
  </app-status-badge>
</ng-template>

<app-data-table
  *ngIf="!store.loading() && !store.loadError() && store.filtered().length > 0"
  [items]="store.paged()"
  [loading]="store.loading()"
  [config]="tableConfig"
  [page]="store.page()"
  [limit]="store.limit()"
  [total]="store.filtered().length"
  [totalPages]="store.totalPages()"
  [rowClassFn]="rowClassFn"
  (pageChange)="onPageChange($event)"
  (limitChange)="onLimitChange($event)"
  (action)="onTableAction($event)">
</app-data-table>

<app-form-modal
  [title]="'Tasa de Cambio'"
  [subtitle]="editingId ? 'Editando tasa existente' : 'Nueva tasa de cambio'"
  [isOpen]="showModal"
  [loading]="saving"
  [isEditing]="editingId !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid"
  (save)="save()"
  (cancel)="closeModal()">

  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      <app-form-field
        label="Fecha"
        [required]="true"
        controlName="fecha">
        <input type="date" formControlName="fecha" />
      </app-form-field>

      <app-form-field
        label="Moneda"
        [required]="true"
        controlName="moneda">
        <app-select
          [options]="monedaFormOptions"
          [formValue]="form.get('moneda')?.value"
          placeholder="Seleccione moneda"
          (valueChange)="form.get('moneda')?.setValue($event)">
        </app-select>
      </app-form-field>

      <app-form-field
        label="Tasa (BOB)"
        [required]="true"
        controlName="tasa"
        [hint]="'Cuántos BOB equivalen a 1 ' + (form.get('moneda')?.value || 'USD')">
        <input
          type="number"
          formControlName="tasa"
          step="0.0001"
          min="0.0001"
          placeholder="Ej: 6.96" />
      </app-form-field>
    </form>
  </ng-template>
</app-form-modal>
