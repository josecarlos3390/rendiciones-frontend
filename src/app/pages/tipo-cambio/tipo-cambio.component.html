<div class="page-header">
  <div class="page-title-group">
    <h2>Tipo de Cambio</h2>
    <p class="page-subtitle">Administra las tasas de cambio en modo OFFLINE.</p>
  </div>
  <button class="btn btn-primary btn-sm" (click)="openCreate()">+ Nueva Tasa</button>
</div>

<!-- Estado OFFLINE -->
<div *ngIf="isOffline" class="alert alert-info">
  <strong>Modo OFFLINE:</strong> Gestión de tasas de cambio locales.
</div>

<!-- ── Filtros ── -->
<app-tipo-cambio-filters
  [monedaOptions]="monedaOptions"
  [filterMoneda]="filterMoneda"
  [filterFechaDesde]="filterFechaDesde"
  [filterFechaHasta]="filterFechaHasta"
  [count]="filtered.length"
  [loading]="loading"
  (monedaChange)="onMonedaChange($event)"
  (fechaDesdeChange)="onFechaDesdeChange($event)"
  (fechaHastaChange)="onFechaHastaChange($event)"
  (reset)="onResetFilters()">>
</app-tipo-cambio-filters>

<!-- Loading / Error / Empty -->
<div *ngIf="loading" class="empty-state">Cargando tasas de cambio...</div>
<div *ngIf="!loading && loadError" class="empty-state">
  Error al cargar los datos.
  <a (click)="loadTasas()">Reintentar</a>
</div>
<div *ngIf="!loading && !loadError && filtered.length === 0" class="empty-state">
  No hay tasas de cambio registradas.
  <a (click)="openCreate()">Crear la primera</a>
</div>

<!-- ── Tabla ── -->
<app-tipo-cambio-table
  *ngIf="!loading && !loadError && filtered.length > 0"
  [items]="paged"
  [page]="page"
  [totalPages]="totalPages"
  (pageChange)="onPageChange($event)"
  (edit)="openEdit($event)"
  (delete)="confirmDelete($event)">
</app-tipo-cambio-table>

<app-form-modal
  [title]="'Tasa de Cambio'"
  [subtitle]="editingId ? 'Editando tasa existente' : 'Nueva tasa de cambio'"
  [isOpen]="showModal"
  [loading]="saving"
  [isEditing]="editingId !== null"
  [isDirty]="isDirty"
  [submitDisabled]="form.invalid"
  (save)="save()"
  (cancel)="closeModal()">
  
  <ng-template #formContent>
    <form [formGroup]="form" (ngSubmit)="save()" novalidate>
      <app-form-field
        label="Fecha"
        [required]="true"
        controlName="fecha">
        <input type="date" formControlName="fecha" />
      </app-form-field>

      <app-form-field
        label="Moneda"
        [required]="true"
        controlName="moneda">
        <app-select
          [options]="monedaFormOptions"
          [formValue]="form.get('moneda')?.value"
          placeholder="Seleccione moneda"
          (valueChange)="form.get('moneda')?.setValue($event)">
        </app-select>
      </app-form-field>

      <app-form-field
        label="Tasa (BOB)"
        [required]="true"
        controlName="tasa"
        [hint]="'Cuántos BOB equivalen a 1 ' + (form.get('moneda')?.value || 'USD')">
        <input 
          type="number" 
          formControlName="tasa"
          step="0.0001"
          min="0.0001"
          placeholder="Ej: 6.96" />
      </app-form-field>
    </form>
  </ng-template>
</app-form-modal>

<!-- Confirm Dialog -->
<app-confirm-dialog
  *ngIf="confirmVisible"
  [config]="confirmConfig"
  (confirm)="onConfirmDelete()"
  (cancel)="closeConfirm()"
/>
