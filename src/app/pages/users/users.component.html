<app-crud-page-header
  title="Administración de Usuarios"
  subtitle="Cree y gestione los accesos al sistema. Asigne roles y contraseñas para cada operador."
  actionLabel="+ Nuevo Usuario"
  (actionClick)="openNew()">
</app-crud-page-header>

<!-- --- Formulario (componente separado) -->
<app-user-form
  [visible]="showForm"
  [user]="editingUser"
  [dimensions]="dimensions"
  [loadingDims]="loadingDims"
  [isSaving]="isSaving"
  (saved)="onFormSaved($event)"
  (cancelled)="closeForm()">
</app-user-form>

<!-- --- Filtros (dumb component) --- -->
<app-users-filters
  [search]="store.search()"
  [loading]="store.loading()"
  [count]="store.filtered().length"
  (searchChange)="onSearchChange($event)"
  (searchCleared)="onSearchCleared()">
</app-users-filters>

<app-skeleton-loader *ngIf="store.loading()" variant="table" [rows]="5"
  [columns]="['18%','22%','12%','14%','12%','12%','10%']">
</app-skeleton-loader>

<app-crud-empty-state
  *ngIf="!store.loading()"
  [error]="store.loadError()"
  [empty]="!store.loadError() && store.filtered().length === 0"
  [searchEmpty]="!store.loadError() && !!store.search() && store.filtered().length === 0"
  errorText="No se pudo cargar la lista de usuarios."
  emptyText="No hay usuarios registrados aún."
  (retry)="load()">
  <ng-container emptyAction>
    <a (click)="openNew()">Crear el primer usuario</a>
  </ng-container>
</app-crud-empty-state>

<!-- --- Templates de columna --- -->
<ng-template #usuarioCol let-item>
  <div class="user-cell">
    <div class="user-avatar" [class.avatar-inactive]="!isActive(item)">{{ initial(item) }}</div>
    <div class="user-cell-info">
      <span class="user-login">{{ item.U_Login }}</span>
      <span class="user-sup" *ngIf="item.U_NomSup">↑ {{ item.U_NomSup }}</span>
    </div>
  </div>
</ng-template>

<ng-template #tipoCol let-item>
  <span class="type-badge" [class.role-admin]="item.U_SuperUser === 1" [class.role-user]="item.U_SuperUser === 0">
    {{ item.U_SuperUser === 1 ? 'Admin' : 'Normal' }}
  </span>
</ng-template>

<ng-template #modulosCol let-item>
  <div class="perm-badges">
    <span class="perm-badge" [class.perm-on]="item.U_AppRend == '1'" title="Rendiciones">R</span>
    <span class="perm-badge" [class.perm-on]="item.U_AppConf == '1'" title="Configuraciones">C</span>
  </div>
</ng-template>

<ng-template #estadoCol let-item>
  <app-status-badge [type]="getBadgeType(item)" [dot]="true">{{ estadoLabel(item) }}</app-status-badge>
</ng-template>

<ng-template #expiraCol let-item>
  <span [class.text-expired]="isExpired(item)">
    {{ item.U_FECHAEXPIRACION | date:'dd/MM/yyyy' }}
  </span>
</ng-template>

<!-- --- Tabla --- -->
<app-data-table
  *ngIf="!store.loading() && !store.loadError() && store.filtered().length > 0"
  [items]="store.paged()"
  [loading]="store.loading()"
  [config]="tableConfig"
  [page]="store.page()"
  [limit]="store.limit()"
  [total]="store.filtered().length"
  [totalPages]="store.totalPages()"
  [rowClassFn]="rowClassFn"
  (pageChange)="onPageChange($event)"
  (limitChange)="onLimitChange($event)"
  (action)="onTableAction($event)">
</app-data-table>
