<div class="page-header">
  <div class="page-title-group">
    <h2>Administracion de Usuarios</h2>
    <p class="page-subtitle">Cree y gestione los accesos al sistema. Asigne roles y contrasenas para cada operador.</p>
  </div>
  <button class="btn btn-primary btn-sm" (click)="openNew()">+ Nuevo Usuario</button>
</div>

<app-confirm-dialog [config]="dialogConfig" [visible]="showDialog"
  (confirmed)="onDialogConfirm()" (cancelled)="onDialogCancel()">
</app-confirm-dialog>

<!-- --- Formulario (componente separado) --- -->
<app-user-form
  [visible]="showForm"
  [user]="editingUser"
  [dimensions]="dimensions"
  [loadingDims]="loadingDims"
  [isSaving]="isSaving"
  (saved)="onFormSaved($event)"
  (cancelled)="closeForm()">
</app-user-form>

<!-- --- Filtros (dumb component) --- -->
<app-users-filters
  [search]="search"
  [loading]="loading"
  [count]="filtered.length"
  (searchChange)="onSearchChange($event)"
  (searchCleared)="onSearchCleared()">
</app-users-filters>

<app-skeleton-loader *ngIf="loading" variant="table" [rows]="5"
  [columns]="['18%','22%','12%','14%','12%','12%','10%']">
</app-skeleton-loader>

<div *ngIf="!loading && loadError" class="empty-state">
  No se pudo cargar la lista de usuarios.
  <a (click)="load()">Reintentar</a>
</div>

<div *ngIf="!loading && !loadError && filtered.length === 0" class="empty-state">
  No hay usuarios registrados aun. <a (click)="openNew()">Crear el primer usuario</a>
</div>

<!-- --- Tabla (dumb component) --- -->
<app-users-table
  *ngIf="!loading && !loadError && filtered.length > 0"
  [items]="paged"
  [page]="page"
  [limit]="limit"
  [totalPages]="totalPages"
  [total]="filtered.length"
  [loading]="loading"
  (pageChange)="onPageChange($event)"
  (limitChange)="onLimitChange($event)"
  (edit)="openEdit($event)"
  (toggleActivo)="confirmToggleStatus($event)">
</app-users-table>
